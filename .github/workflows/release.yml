name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config rpm

      - name: Install cross-compilation tools for ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare release directory
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/openixcli release/

      - name: Create tarball
        run: |
          cd release
          tar -czvf openixcli-${{ matrix.target }}.tar.gz openixcli
          mv openixcli-${{ matrix.target }}.tar.gz ..

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build DEB package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deb -- --target ${{ matrix.target }} --output openixcli-${{ matrix.target }}.deb

      - name: Build RPM package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p rpm/SPECS rpm/SOURCES rpm/BUILD rpm/RPMS rpm/SRPMS
          cat > rpm/SPECS/openixcli.spec << 'EOF'
          Name: openixcli
          Version: ${{ github.event.release.tag_name }}
          Release: 1
          Summary: A command-line firmware flashing tool for Allwinner chips
          License: MIT
          URL: https://github.com/YuzukiTsuru/OpenixCLI

          %description
          OpenixCLI is a powerful and user-friendly CLI tool designed for flashing firmware to devices powered by Allwinner SoCs.

          %files
          %defattr(-,root,root,-)
          /usr/bin/openixcli

          %install
          mkdir -p %{buildroot}/usr/bin
          cp target/${{ matrix.target }}/release/openixcli %{buildroot}/usr/bin/

          %build

          %prep
          EOF
          rpmbuild --define "_topdir $(pwd)/rpm" --target x86_64 -bb rpm/SPECS/openixcli.spec
          mv rpm/RPMS/x86_64/openixcli-*.rpm openixcli-${{ matrix.target }}.rpm

      - name: Install appimage tools
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/openixcli AppDir/usr/bin/
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          exec "$APPDIR/usr/bin/openixcli" "$@"
          EOF
          chmod +x AppDir/AppRun
          cat > AppDir/openixcli.desktop << 'EOF'
          [Desktop Entry]
          Name=OpenixCLI
          Exec=openixcli
          Type=Application
          Categories=Utility;
          EOF
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv OpenixCLI-*.AppImage openixcli-${{ matrix.target }}.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            openixcli-${{ matrix.target }}.tar.gz
            openixcli-${{ matrix.target }}.deb
            openixcli-${{ matrix.target }}.rpm
            openixcli-${{ matrix.target }}.AppImage

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install libusb
        run: brew install libusb

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/openixcli release/
          cd release
          tar -czvf openixcli-${{ matrix.target }}.tar.gz openixcli
          mv openixcli-${{ matrix.target }}.tar.gz ..

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp target/${{ matrix.target }}/release/openixcli dmg_temp/
          hdiutil create -volname "OpenixCLI" -srcfolder dmg_temp -ov -format UDZO openixcli-${{ matrix.target }}.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            openixcli-${{ matrix.target }}.tar.gz
            openixcli-${{ matrix.target }}.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install libusb
        run: |
          vcpkg install libusb:x64-windows
          vcpkg integrate install

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create zip
        run: |
          mkdir release
          cp target/${{ matrix.target }}/release/openixcli.exe release/
          Compress-Archive -Path release/* -DestinationPath openixcli-${{ matrix.target }}.zip

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.4
          wix --version

      - name: Create MSI package
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          $wxsContent = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="OpenixCLI" Manufacturer="YuzukiTsuru" Version="$version" UpgradeCode="E9F8A8C0-1D2E-4B3C-8F9A-5E6D7C8B9A0F" Language="1033">
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="MainFeature" Title="OpenixCLI" Level="1">
                <ComponentRef Id="OpenixCLIComponent" />
              </Feature>
              <StandardDirectory Id="ProgramFiles6432Folder">
                <Directory Id="INSTALLFOLDER" Name="OpenixCLI">
                  <Component Id="OpenixCLIComponent" Guid="*">
                    <File Id="OpenixCLIExe" Source="target/${{ matrix.target }}/release/openixcli.exe" KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>
            </Package>
          </Wix>
          "@
          $wxsContent | Out-File -FilePath "openixcli.wxs" -Encoding UTF8
          wix build openixcli.wxs -o openixcli-${{ matrix.target }}.msi
        shell: pwsh

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS installer
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          $nsisContent = @"
          !include "MUI2.nsh"
          Name "OpenixCLI"
          OutFile "openixcli-${{ matrix.target }}-setup.exe"
          InstallDir "$PROGRAMFILES\OpenixCLI"
          InstallDirRegKey HKLM "Software\OpenixCLI" "Install_Dir"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_LICENSE "LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_WELCOME
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_UNPAGE_FINISH

          !insertmacro MUI_LANGUAGE "English"

          Section "OpenixCLI" SecOpenixCLI
            SetOutPath "$INSTDIR"
            File "target\${{ matrix.target }}\release\openixcli.exe"
            WriteRegStr HKLM "Software\OpenixCLI" "Install_Dir" "$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\OpenixCLI" "DisplayName" "OpenixCLI"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\OpenixCLI" "UninstallString" '"$INSTDIR\uninstall.exe"'
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\OpenixCLI" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\OpenixCLI" "NoRepair" 1
            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$INSTDIR\openixcli.exe"
            Delete "$INSTDIR\uninstall.exe"
            RMDir "$INSTDIR"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\OpenixCLI"
            DeleteRegKey HKLM "Software\OpenixCLI"
          SectionEnd
          "@
          $nsisContent | Out-File -FilePath "installer.nsi" -Encoding UTF8
          makensis installer.nsi
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            openixcli-${{ matrix.target }}.zip
            openixcli-${{ matrix.target }}.msi
            openixcli-${{ matrix.target }}-setup.exe

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, generate-changelog]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.zip" -o -name "*.msi" -o -name "*-setup.exe" \) -exec cp {} release-assets/ \;

      - name: Generate full changelog
        id: full_changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Downloads" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Linux" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-unknown-linux-gnu.tar.gz\` - Linux x86_64 binary" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-unknown-linux-gnu.deb\` - Debian/Ubuntu package (x86_64)" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-unknown-linux-gnu.rpm\` - RHEL/Fedora package (x86_64)" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-unknown-linux-gnu.AppImage\` - AppImage (x86_64)" >> $GITHUB_OUTPUT
          echo "- \`openixcli-aarch64-unknown-linux-gnu.tar.gz\` - Linux ARM64 binary" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### macOS" >> $GITHUB_OUTPUT
          echo "- \`openixcli-aarch64-apple-darwin.tar.gz\` - macOS Apple Silicon binary" >> $GITHUB_OUTPUT
          echo "- \`openixcli-aarch64-apple-darwin.dmg\` - macOS Apple Silicon DMG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Windows" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-pc-windows-msvc.zip\` - Windows x86_64 binary" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-pc-windows-msvc.msi\` - Windows x86_64 MSI installer" >> $GITHUB_OUTPUT
          echo "- \`openixcli-x86_64-pc-windows-msvc-setup.exe\` - Windows x86_64 NSIS installer" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.full_changelog.outputs.changelog }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
