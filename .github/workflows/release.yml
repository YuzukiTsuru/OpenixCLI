name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x64
            toolchain: stable
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            toolchain: stable
          - target: arm-unknown-linux-gnueabihf
            arch: arm
            toolchain: stable
          - target: riscv64gc-unknown-linux-gnu
            arch: riscv64
            toolchain: stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config rpm

      - name: Install cross-compilation toolchain
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              ;;
            arm-unknown-linux-gnueabihf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
              ;;
            riscv64gc-unknown-linux-gnu)
              sudo apt-get install -y gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
              ;;
          esac

      - name: Build libusb and libudev from source for cross-compilation
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          # Install build dependencies
          sudo apt-get install -y \
            build-essential \
            libblkid-dev \
            libkmod-dev \
            libselinux1-dev \
            autoconf \
            automake \
            xsltproc \
            docbook-xml \
            docbook-xsl \
            gperf \
            libglib-object-introspection-perl \
            libglib2.0-dev \
            libtool \
            pkg-config

          # Set cross-compile settings based on target
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              HOST_TRIPLE="aarch64-linux-gnu"
              ;;
            arm-unknown-linux-gnueabihf)
              HOST_TRIPLE="arm-linux-gnueabihf"
              ;;
            riscv64gc-unknown-linux-gnu)
              HOST_TRIPLE="riscv64-linux-gnu"
              ;;
          esac

          # Cross-compiler sysroot path
          SYSROOT="/usr/${HOST_TRIPLE}"

          # Build libusb
          git clone --depth 1 --branch v1.0.27 https://github.com/libusb/libusb.git /tmp/libusb
          cd /tmp/libusb
          ./bootstrap.sh
          ./configure \
            --host=${HOST_TRIPLE} \
            --prefix=/usr \
            --disable-static \
            --enable-shared \
            --disable-udev
          make -j$(nproc)
          sudo make install DESTDIR=${SYSROOT}

          # Build eudev (libudev)
          git clone --depth 1 --branch v3.2.14 https://github.com/eudev-project/eudev.git /tmp/eudev
          cd /tmp/eudev
          ./autogen.sh
          ./configure \
            --host=${HOST_TRIPLE} \
            --prefix=/usr \
            --disable-static \
            --enable-shared \
            --disable-programs \
            --disable-blkid \
            --disable-kmod
          make -j$(nproc)
          sudo make install DESTDIR=${SYSROOT}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              SYSROOT="/usr/aarch64-linux-gnu"
              ;;
            arm-unknown-linux-gnueabihf)
              SYSROOT="/usr/arm-linux-gnueabihf"
              ;;
            riscv64gc-unknown-linux-gnu)
              SYSROOT="/usr/riscv64-linux-gnu"
              ;;
            *)
              SYSROOT=""
              ;;
          esac

          if [ -n "${SYSROOT}" ]; then
            export LIBRARY_PATH="${SYSROOT}/lib:${SYSROOT}/usr/lib:${LIBRARY_PATH:-}"
            export PKG_CONFIG_PATH="${SYSROOT}/usr/lib/pkgconfig"
            export PKG_CONFIG_LIBDIR="${SYSROOT}/usr/lib/pkgconfig"
            export CMAKE_PREFIX_PATH="${SYSROOT}/usr"
            export CMAKE_FIND_ROOT_PATH="${SYSROOT}"
            export RUSTFLAGS="-L ${SYSROOT}/lib -L ${SYSROOT}/usr/lib"
          fi
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          # CMake cross-compilation settings
          CMAKE_SYSTEM_NAME: Linux
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CC_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CXX_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-g++

      - name: Create tarball
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/openixcli release/
          cd release
          tar -czvf openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz openixcli
          mv openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz ..

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm cargo-appimage

      - name: Build DEB package
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo deb --target ${{ matrix.target }}
          mv target/debian/openixcli_*.deb openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.deb || true

      - name: Build RPM package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo generate-rpm --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/generate-rpm/*.rpm openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.rpm

      - name: Build AppImage
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo appimage --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/appimage/*.AppImage openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.deb
            openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.rpm
            openixcli-${{ env.RELEASE_TAG }}-${{ matrix.target }}.AppImage

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install libusb
        run: brew install libusb

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run macOS build script
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh ${{ matrix.target }} ${{ env.RELEASE_TAG }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            openixcli-v*-${{ matrix.target }}.tar.gz
            openixcli-v*-${{ matrix.target }}.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            vcpkg_triplet: x64-windows
          - target: aarch64-pc-windows-msvc
            vcpkg_triplet: arm64-windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install libusb
        run: |
          vcpkg install libusb:${{ matrix.vcpkg_triplet }}
          vcpkg integrate install

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install packaging tools
        run: |
          dotnet tool install --global wix --version 4.0.4
          choco install nsis -y

      - name: Run Windows build script
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          ./scripts/build-windows.ps1 ${{ matrix.target }} ${{ env.RELEASE_TAG }}
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            openixcli-v*-${{ matrix.target }}.zip
            openixcli-v*-${{ matrix.target }}.msi
            openixcli-v*-${{ matrix.target }}-setup.exe

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, generate-changelog]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.zip" -o -name "*.msi" -o -name "*-setup.exe" \) -exec cp {} release-assets/ \;

      - name: Generate full changelog
        id: full_changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## Downloads" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Linux" >> $GITHUB_OUTPUT
          echo "- **x86_64**: \`openixcli-x86_64-unknown-linux-gnu.tar.gz\` / \`.deb\` / \`.rpm\` / \`.AppImage\`" >> $GITHUB_OUTPUT
          echo "- **ARM64**: \`openixcli-aarch64-unknown-linux-gnu.tar.gz\` / \`.deb\` / \`.AppImage\`" >> $GITHUB_OUTPUT
          echo "- **ARM**: \`openixcli-arm-unknown-linux-gnueabihf.tar.gz\`" >> $GITHUB_OUTPUT
          echo "- **RISC-V 64**: \`openixcli-riscv64gc-unknown-linux-gnu.tar.gz\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### macOS" >> $GITHUB_OUTPUT
          echo "- **Apple Silicon**: \`openixcli-aarch64-apple-darwin.tar.gz\` / \`.dmg\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Windows" >> $GITHUB_OUTPUT
          echo "- **x86_64**: \`openixcli-x86_64-pc-windows-msvc.zip\` / \`.msi\` / \`-setup.exe\`" >> $GITHUB_OUTPUT
          echo "- **ARM64**: \`openixcli-aarch64-pc-windows-msvc.zip\` / \`.msi\` / \`-setup.exe\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.full_changelog.outputs.changelog }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
