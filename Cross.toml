[build.env]
passthrough = ["CMAKE_PREFIX_PATH"]

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y wget",
    "wget -q https://github.com/Kitware/CMake/releases/download/v3.20.6/cmake-3.20.6-Linux-x86_64.sh -O /tmp/cmake.sh && sh /tmp/cmake.sh --skip-license --prefix=/usr/local && rm /tmp/cmake.sh",
    "apt-get install -y libusb-1.0-0-dev libudev-dev pkg-config || (apt-get install -y autoconf automake libtool git && git clone --depth 1 --branch v1.0.27 https://github.com/libusb/libusb.git /tmp/libusb && cd /tmp/libusb && ./bootstrap.sh && ./configure --prefix=/usr --disable-static --enable-shared --disable-udev && make -j$(nproc) && make install && rm -rf /tmp/libusb) && rm -rf /var/lib/apt/lists/*"
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y wget",
    "wget -q https://github.com/Kitware/CMake/releases/download/v3.20.6/cmake-3.20.6-Linux-x86_64.sh -O /tmp/cmake.sh && sh /tmp/cmake.sh --skip-license --prefix=/usr/local && rm /tmp/cmake.sh",
    "apt-get install -y libusb-1.0-0-dev:$CROSS_DEB_ARCH libudev-dev:$CROSS_DEB_ARCH pkg-config || (apt-get install -y autoconf automake libtool git && git clone --depth 1 --branch v1.0.27 https://github.com/libusb/libusb.git /tmp/libusb && cd /tmp/libusb && ./bootstrap.sh && ./configure --host=aarch64-linux-gnu --prefix=/usr/aarch64-linux-gnu --disable-static --enable-shared --disable-udev CC=aarch64-linux-gnu-gcc && make -j$(nproc) && make install && rm -rf /tmp/libusb) && rm -rf /var/lib/apt/lists/*"
]

